services:
  backend:
    environment:
      PYTHONUNBUFFERED: 1
    build: .           # utilise le Dockerfile du dossier courant
    ports:
      - "8000:8000"    # ta_machine:conteneur
    env_file:
      - .env
    volumes:
      - .:/app         # bind mount — ton code local = code dans le conteneur
    depends_on:
      - db             # attend que postgres démarre avant
      - redis
    command: python manage.py runserver 0.0.0.0:8000

  db:
    restart: always
    image: postgres:16
    container_name: postgres #you can change this
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build: ../cardboard-frontend/mon-frontend
    ports:
      - "3000:3000"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: always
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/demo
      KC_DB_USERNAME: demo
      KC_DB_PASSWORD: demo
    command: start-dev
    ports:
      - "8080:8080"

  # Celery Service
  celery:
      build: .
      command: celery -A website worker -l INFO
      volumes:
          - .:/app
      environment:
        PYTHONUNBUFFERED: 1
        DEBUG: 1
        DJANGO_ALLOWED_HOSTS: "localhost backend 127.0.0.1 [::1]"
        CELERY_BROKER: "redis://redis:6379/0"
        CELERY_BACKEND: "redis://redis:6379/0"
      env_file:
        - .env
      depends_on:
          - backend
          - redis

  # Redis Service
  redis:
      image: "redis:alpine"

volumes:
  postgres_data: